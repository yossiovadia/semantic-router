name: Feature Request
description: Feature request
labels: ["feature request"]
title: "feature: <title>"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!
  - type: textarea
    attributes:
      label: Describe the feature
      description: A clear and concise description of what the feature is.
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Primary layer
      description: Which core layer should primarily own this feature?
      options:
        - signal
        - plugin
        - global level
        - unsure
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why this layer?
      description: Explain why this belongs in signal, plugin, or the global level. Signal is for extracting information from text, plugin is for decision-driven processing, and global level is for intentionally cross-cutting behavior.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Why do you need this feature?
      description: A clear and concise description of why you need this feature.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Love this enhancement proposal? Give it a 👍. We prioritise the proposals with the most 👍.
