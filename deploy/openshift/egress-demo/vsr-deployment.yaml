# vSR Router + Envoy Proxy for egress demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vsr-router
  labels:
    app: vsr-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vsr-router
  template:
    metadata:
      labels:
        app: vsr-router
    spec:
      initContainers:
      # Download classifier models from HuggingFace on startup
      - name: download-models
        image: python:3.11-slim
        env:
        - name: HOME
          value: /tmp
        - name: PIP_CACHE_DIR
          value: /tmp/pip-cache
        - name: HF_HOME
          value: /tmp/hf-cache
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        command:
        - /bin/sh
        - -c
        - |
          pip install --user -q huggingface_hub 2>/dev/null
          export PATH="/tmp/.local/bin:$PATH"
          python3 -c "
          from huggingface_hub import snapshot_download
          import os
          # Map local directory names to HuggingFace repo IDs
          # 'check_file' ensures large weight files are present (not just config.json)
          models = {
              'mom-domain-classifier': {'repo': 'LLM-Semantic-Router/lora_intent_classifier_bert-base-uncased_model', 'check': 'config.json'},
              'mom-pii-classifier': {'repo': 'LLM-Semantic-Router/lora_pii_detector_bert-base-uncased_model', 'check': 'config.json'},
              'mom-embedding-light': {'repo': 'sentence-transformers/all-MiniLM-L12-v2', 'check': 'model.safetensors'},
              'mom-embedding-ultra': {'repo': 'llm-semantic-router/mmbert-embed-32k-2d-matryoshka', 'check': 'model.safetensors'},
          }
          for local_name, info in models.items():
              dest = f'/models/{local_name}'
              check_path = f'{dest}/{info[\"check\"]}'
              if os.path.exists(check_path):
                  size_mb = os.path.getsize(check_path) / 1024**2
                  print(f'{local_name}: ready ({size_mb:.0f} MB)')
              else:
                  print(f'{local_name}: downloading from {info[\"repo\"]}...')
                  snapshot_download(info['repo'], local_dir=dest)
                  print(f'{local_name}: done')
          print('All models ready')
          "
        volumeMounts:
        - name: models
          mountPath: /models
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1"
      containers:
      - name: semantic-router
        image: quay.io/jabadia/vsr-extproc:latest
        command: ["/usr/local/bin/router"]
        args: ["-config", "/app/config.yaml", "-port=50051", "-enable-api=true", "-api-port=8080"]
        ports:
        - containerPort: 50051
          name: grpc
        - containerPort: 9190
          name: metrics
        - containerPort: 8080
          name: api
        env:
        - name: CONFIG_FILE
          value: "/app/config.yaml"
        - name: LD_LIBRARY_PATH
          value: "/usr/local/lib"
        - name: HOME
          value: "/tmp/home"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 45
          periodSeconds: 10
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                # Wait for API to be ready, then auto-index RAG docs
                for i in $(seq 1 60); do
                  curl -sf http://localhost:8080/v1/vector_stores >/dev/null 2>&1 && break
                  sleep 2
                done
                # Create vector store and index all docs from ConfigMap
                VS_ID=$(curl -sS -X POST http://localhost:8080/v1/vector_stores \
                  -H 'Content-Type: application/json' -d '{"name":"nb-finance-docs"}' 2>/dev/null \
                  | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
                if [ -n "$VS_ID" ] && [ -d /app/rag-docs ]; then
                  for doc in /app/rag-docs/*.md; do
                    [ -f "$doc" ] || continue
                    FID=$(curl -sS -X POST http://localhost:8080/v1/files \
                      -F "file=@${doc}" -F "purpose=assistants" 2>/dev/null \
                      | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
                    [ -n "$FID" ] && curl -sS -X POST "http://localhost:8080/v1/vector_stores/${VS_ID}/files" \
                      -H 'Content-Type: application/json' -d "{\"file_id\":\"${FID}\"}" >/dev/null 2>&1
                  done
                fi
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: models
          mountPath: /app/models
        - name: rag-docs
          mountPath: /app/rag-docs
          readOnly: true
      - name: envoy-proxy
        image: envoyproxy/envoy:v1.33.2
        command: ["/usr/local/bin/envoy"]
        args: ["-c", "/etc/envoy/envoy.yaml"]
        ports:
        - containerPort: 8801
          name: http
        - containerPort: 19000
          name: admin
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          tcpSocket:
            port: 8801
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 8801
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: vsr-egress-config
      - name: envoy-config
        configMap:
          name: envoy-egress-config
      - name: models
        emptyDir: {}
      - name: rag-docs
        configMap:
          name: rag-docs
---
apiVersion: v1
kind: Service
metadata:
  name: vsr-gateway
  labels:
    app: vsr-router
spec:
  ports:
  - name: http
    port: 8801
    targetPort: 8801
  - name: grpc
    port: 50051
    targetPort: 50051
  - name: api
    port: 8080
    targetPort: 8080
  selector:
    app: vsr-router
