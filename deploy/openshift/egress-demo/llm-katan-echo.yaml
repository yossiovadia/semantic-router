# llm-katan with echo backend — instant responses, no model download
# Simulates: external provider (port 8000) + internal model (port 8001)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-katan-external
  labels:
    app: llm-katan
    role: external-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-katan
      role: external-provider
  template:
    metadata:
      labels:
        app: llm-katan
        role: external-provider
    spec:
      containers:
      - name: llm-katan
        image: ghcr.io/vllm-project/semantic-router/llm-katan:latest
        args: ["--backend", "echo", "--served-model-name", "qwen2.5:1.5b", "--port", "8000"]
        ports:
        - containerPort: 8000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-katan-internal
  labels:
    app: llm-katan
    role: internal-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-katan
      role: internal-model
  template:
    metadata:
      labels:
        app: llm-katan
        role: internal-model
    spec:
      containers:
      - name: llm-katan
        image: ghcr.io/vllm-project/semantic-router/llm-katan:latest
        args: ["--backend", "echo", "--served-model-name", "mock-llama3", "--port", "8000"]
        ports:
        - containerPort: 8000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: llm-katan-external
  labels:
    app: llm-katan
    role: external-provider
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: llm-katan
    role: external-provider
---
apiVersion: v1
kind: Service
metadata:
  name: llm-katan-internal
  labels:
    app: llm-katan
    role: internal-model
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: llm-katan
    role: internal-model
