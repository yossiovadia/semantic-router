# Request rate limiting via Kuadrant/Limitador
# Enforced at the Gateway level — returns 429 when exceeded
#
# NOTE: TokenRateLimitPolicy (v1alpha1) is NOT used because it breaks
# AuthPolicy enforcement when both are on the same Gateway. This is a
# known issue in Kuadrant Wasm shim v0.11.1 — the token-based policy's
# response body processing interferes with auth action dispatching.
# Use RateLimitPolicy (v1, request-based) instead.
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: vsr-demo-rate-limits
  namespace: openshift-ingress
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: vsr-demo-gateway
  limits:
    per-user-limit:
      rates:
        - limit: 10
          window: 1m
