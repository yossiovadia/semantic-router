# Rate limiting via Kuadrant/Limitador
# Two policies enforced at the Gateway level:
# 1. Request-based: 10 requests/min (RateLimitPolicy v1)
# 2. Token-based: 100 tokens/min (TokenRateLimitPolicy v1alpha1)
# Both return 429 when exceeded.
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: vsr-demo-rate-limits
  namespace: openshift-ingress
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: vsr-demo-gateway
  limits:
    per-user-limit:
      rates:
        - limit: 10
          window: 1m
---
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: vsr-demo-token-limits
  namespace: openshift-ingress
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: vsr-demo-gateway
  limits:
    global-token-limit:
      rates:
        - limit: 100
          window: 1m
