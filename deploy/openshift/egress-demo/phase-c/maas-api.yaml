# MaaS API — standalone deployment for tier lookup
# Provides POST /v1/tiers/lookup endpoint used by Kuadrant AuthPolicy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maas-api
  namespace: vsr-egress-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-api-vsr-demo
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices", "llminferenceservices"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: maas-api-vsr-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: maas-api-vsr-demo
subjects:
- kind: ServiceAccount
  name: maas-api
  namespace: vsr-egress-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tier-to-group-mapping
  namespace: vsr-egress-demo
  labels:
    app: maas-api
data:
  tiers: |
    - name: free
      displayName: Free Tier
      level: 0
      groups:
        - system:authenticated
        - system:serviceaccounts:vsr-egress-demo

    - name: premium
      displayName: Premium Tier
      level: 1
      groups:
        - system:serviceaccounts:vsr-demo-tier-premium

    - name: enterprise
      displayName: Enterprise Tier
      level: 2
      groups:
        - system:serviceaccounts:vsr-demo-tier-enterprise
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-api
  namespace: vsr-egress-demo
  labels:
    app: maas-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maas-api
  template:
    metadata:
      labels:
        app: maas-api
    spec:
      serviceAccountName: maas-api
      securityContext:
        runAsNonRoot: true
      containers:
      - name: maas-api
        image: quay.io/opendatahub/maas-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SECURE
          value: "false"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: maas-api
  namespace: vsr-egress-demo
  labels:
    app: maas-api
spec:
  selector:
    app: maas-api
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  type: ClusterIP
