# HTTPRoute: routes from Gateway to our Envoy+ExtProc gateway service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vsr-gateway-route
  namespace: vsr-egress-demo
spec:
  parentRefs:
  - name: vsr-demo-gateway
    namespace: openshift-ingress
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/
    backendRefs:
    - name: vsr-gateway
      port: 8801
