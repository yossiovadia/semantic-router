# llm-katan with real Qwen3-0.6B model — actual inference, CPU only
# Simulates: external provider (port 8000) + internal model (port 8001)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-katan-external
  labels:
    app: llm-katan
    role: external-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-katan
      role: external-provider
  template:
    metadata:
      labels:
        app: llm-katan
        role: external-provider
    spec:
      containers:
      - name: llm-katan
        image: ghcr.io/vllm-project/semantic-router/llm-katan:latest
        args: ["--model", "Qwen/Qwen3-0.6B", "--served-model-name", "qwen2.5:1.5b", "--port", "8000", "--quantize"]
        ports:
        - containerPort: 8000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 10
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-katan-internal
  labels:
    app: llm-katan
    role: internal-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-katan
      role: internal-model
  template:
    metadata:
      labels:
        app: llm-katan
        role: internal-model
    spec:
      containers:
      - name: llm-katan
        image: ghcr.io/vllm-project/semantic-router/llm-katan:latest
        args: ["--model", "Qwen/Qwen3-0.6B", "--served-model-name", "qwen3-0.6b", "--port", "8000", "--quantize"]
        ports:
        - containerPort: 8000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 10
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: llm-katan-external
  labels:
    app: llm-katan
    role: external-provider
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: llm-katan
    role: external-provider
---
apiVersion: v1
kind: Service
metadata:
  name: llm-katan-internal
  labels:
    app: llm-katan
    role: internal-model
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: llm-katan
    role: internal-model
