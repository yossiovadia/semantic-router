# vSR Egress Demo — OpenShift Config
# Uses cluster-internal service names for endpoints
# Classification + PII detection enabled for intelligent routing

# --- ML Models ---
bert_model:
  model_id: models/mom-embedding-light
  threshold: 0.6
  use_cpu: true

classifier:
  category_model:
    model_id: "models/mom-domain-classifier"
    threshold: 0.6
    use_cpu: true
    category_mapping_path: "models/mom-domain-classifier/category_mapping.json"
  pii_model:
    model_id: "models/mom-pii-classifier"
    use_modernbert: false
    threshold: 0.7
    use_cpu: true
    pii_mapping_path: "models/mom-pii-classifier/pii_type_mapping.json"

embedding_models:
  mmbert_model_path: "models/mom-embedding-ultra"
  bert_model_path: "models/mom-embedding-light"
  use_cpu: true
  hnsw_config:
    model_type: "mmbert"
    preload_embeddings: true
    target_dimension: 768

prompt_guard:
  enabled: false

semantic_cache:
  enabled: false

# --- Vector Store (local RAG) ---
vector_store:
  enabled: true
  backend_type: "memory"
  file_storage_dir: "/tmp/vsr-data"
  max_file_size_mb: 50
  embedding_model: "mmbert"
  embedding_dimension: 768
  ingestion_workers: 2
  supported_formats:
    - ".txt"
    - ".md"
    - ".json"

# --- Backend Endpoints ---
vllm_endpoints:
  - name: "external-provider"
    address: "llm-katan-external.external-providers.svc.cluster.local"
    port: 8000
    weight: 1
  - name: "anthropic-endpoint"
    address: "mock-anthropic.external-providers.svc.cluster.local"
    port: 8003
    weight: 1
  - name: "gpu-endpoint"
    address: "vllm-gpu"
    port: 8000
    weight: 1

# --- Model Configuration ---
model_config:
  "qwen2.5:1.5b":
    preferred_endpoints: ["external-provider"]
  "claude-sonnet":
    api_format: "anthropic"
    # DEMO ONLY: Mock API key. In production, use K8s Secrets or ATM.
    access_key: "mock-anthropic-key-for-demo"
    preferred_endpoints: ["anthropic-endpoint"]
  "qwen2.5-7b":
    preferred_endpoints: ["gpu-endpoint"]

# --- Categories ---
categories:
  - name: math
    description: "Mathematics and quantitative reasoning"
    mmlu_categories: ["math"]
  - name: "computer science"
    description: "Computer science and programming"
    mmlu_categories: ["computer_science"]
  - name: health
    description: "Health and medical information"
    mmlu_categories: ["health"]
  - name: business
    description: "Business and finance"
    mmlu_categories: ["business"]
  - name: other
    description: "General knowledge"
    mmlu_categories: ["other"]

# --- Complexity Rules (embedding-based, few-shot) ---
# vSR compares query embeddings against hard/easy candidates using mmbert.
# difficultySignal = maxHardSim - maxEasySim → hard/medium/easy
complexity_rules:
  - name: "query-complexity"
    description: "General query complexity classification"
    threshold: 0.2
    hard:
      candidates:
        - "Implement a binary search tree with insert, delete, and balanced rotation operations"
        - "Implement a distributed lock manager with leader election and fencing tokens"
        - "Design a database migration system with rollback support and schema versioning"
        - "Prove the fundamental theorem of calculus using epsilon-delta definition"
        - "Write a comprehensive analysis comparing merge sort, quicksort, and timsort with proofs of time complexity"
        - "Analyze the economic implications of quantitative easing on emerging market bond yields"
        - "Build a graph algorithm for strongly connected components with Tarjan's algorithm"
        - "Implement a custom memory allocator with garbage collection and fragmentation handling"
        - "Derive the Black-Scholes option pricing formula from first principles"
    easy:
      candidates:
        - "What is 2+2?"
        - "What is the capital of France?"
        - "How many days are in a week?"
        - "What does ETF stand for?"
        - "Write hello world in Python"
        - "What is 5 + 3?"
        - "Solve 2x = 10"
        - "What is Kubernetes?"
        - "What is a bond yield?"

# --- PII Detection Rules (signal-based, like complexity_rules) ---
# Named PII rules referenced by decision conditions (type: "pii").
# The signal fires when PII types NOT in pii_types_allowed are detected.
pii:
  - name: "pii-block-egress"
    description: "Block sensitive PII that must not leave the datacenter"
    threshold: 0.7
    pii_types_allowed:
      - "PERSON"
      - "PHONE_NUMBER"
      - "STREET_ADDRESS"
      - "ORGANIZATION"
      - "DATE_TIME"
      - "NRP"
      - "US_SSN"
      - "GPE"
      - "ZIP_CODE"
    # Types NOT listed (EMAIL_ADDRESS, CREDIT_CARD, DOMAIN_NAME, IP_ADDRESS,
    # IBAN_CODE, US_DRIVER_LICENSE) trigger the signal → decision matches → block

# --- Authz (upstream vSR PR #1321) ---
# Reads identity from headers injected by Kuadrant AuthPolicy.
# Replaces our custom model_access_policy with native tier-aware routing.
authz:
  fail_open: true  # Allow unauthenticated requests (direct gateway) to fall through
  identity:
    user_id_header: "x-authz-user-id"
    user_groups_header: "x-authz-user-groups"

# --- Role Bindings ---
# Map tier groups (from Authorino) to roles used in decision conditions.
role_bindings:
  - name: "free-binding"
    subjects:
      - kind: Group
        name: "free"
    role: "free"
  - name: "premium-binding"
    subjects:
      - kind: Group
        name: "premium"
    role: "premium"
  - name: "enterprise-binding"
    subjects:
      - kind: Group
        name: "enterprise"
    role: "enterprise"

# --- Decision-based Routing ---
# When model="auto", vSR classifies the query and routes based on these rules.
# Higher priority = evaluated first. First matching decision wins.
# Authz conditions restrict which tiers match each decision.
strategy: "priority"

decisions:
  # PII enforcement: block queries containing sensitive PII (emails, credit cards, etc.)
  # References the pii-block-egress rule — fires when disallowed PII is detected.
  - name: "pii_block"
    description: "Block queries with email, credit card, or other egress-risky PII"
    priority: 300
    rules:
      operator: "AND"
      conditions:
        - type: "pii"
          name: "pii-block-egress"
    modelRefs:
      - model: "qwen2.5-7b"
        use_reasoning: false

  # Easy queries always stay internal (all tiers, cost optimized)
  - name: "easy_internal"
    description: "Simple queries stay on-prem — no need for expensive external model"
    priority: 200
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "query-complexity:easy"
    modelRefs:
      - model: "qwen2.5-7b"
        use_reasoning: false

  # Free tier: ALL non-easy queries → internal model (no egress, no 403)
  - name: "free_internal"
    description: "Free tier always routes to internal GPU model"
    priority: 150
    rules:
      operator: "AND"
      conditions:
        - type: "authz"
          name: "free"
    modelRefs:
      - model: "qwen2.5-7b"
        use_reasoning: false

  # Math domain → external model (free tier already caught at priority 150)
  # PII BLOCKED on external — data would leave the datacenter
  - name: "math_external"
    description: "Route math queries (medium/hard) to powerful external model"
    priority: 100
    rules:
      operator: "AND"
      conditions:
        - type: "domain"
          name: "math"
    modelRefs:
      - model: "claude-sonnet"
        use_reasoning: false

  # CS domain → external model (free tier already caught at priority 150)
  - name: "cs_external"
    description: "Route CS/coding queries (medium/hard) to external model"
    priority: 100
    rules:
      operator: "AND"
      conditions:
        - type: "domain"
          name: "computer science"
    modelRefs:
      - model: "claude-sonnet"
        use_reasoning: false

  # Default catch-all → internal GPU model (all tiers, data stays on-prem)
  - name: "default_internal"
    description: "Default: route to internal GPU model"
    priority: 1
    rules:
      operator: "OR"
      conditions:
        - type: "complexity"
          name: "query-complexity:medium"
        - type: "complexity"
          name: "query-complexity:hard"
        - type: "complexity"
          name: "query-complexity:easy"
    modelRefs:
      - model: "qwen2.5-7b"
        use_reasoning: false

default_model: "qwen2.5-7b"

# Required for header-based routing in Envoy
clear_route_cache: true

observability:
  metrics:
    enabled: true
