# vSR Egress Demo — OpenShift Config
# Uses cluster-internal service names for endpoints
# Classification + PII detection enabled for intelligent routing

# --- ML Models ---
bert_model:
  model_id: models/mom-embedding-light
  threshold: 0.6
  use_cpu: true

classifier:
  category_model:
    model_id: "models/mom-domain-classifier"
    threshold: 0.6
    use_cpu: true
    category_mapping_path: "models/mom-domain-classifier/category_mapping.json"
  pii_model:
    model_id: "models/mom-pii-classifier"
    use_modernbert: false
    threshold: 0.7
    use_cpu: true
    pii_mapping_path: "models/mom-pii-classifier/pii_type_mapping.json"

embedding_models:
  mmbert_model_path: "models/mom-embedding-ultra"
  bert_model_path: "models/mom-embedding-light"
  use_cpu: true
  hnsw_config:
    model_type: "mmbert"
    preload_embeddings: true
    target_dimension: 768

prompt_guard:
  enabled: false

semantic_cache:
  enabled: false

# --- Vector Store (local RAG) ---
vector_store:
  enabled: true
  backend_type: "memory"
  file_storage_dir: "/tmp/vsr-data"
  max_file_size_mb: 50
  embedding_model: "mmbert"
  embedding_dimension: 768
  ingestion_workers: 2
  supported_formats:
    - ".txt"
    - ".md"
    - ".json"

# --- Backend Endpoints ---
vllm_endpoints:
  - name: "external-provider"
    address: "llm-katan-external.external-providers.svc.cluster.local"
    port: 8000
    weight: 1
  - name: "anthropic-endpoint"
    address: "mock-anthropic.external-providers.svc.cluster.local"
    port: 8003
    weight: 1
  - name: "gpu-endpoint"
    address: "vllm-gpu"
    port: 8000
    weight: 1

# --- Model Configuration ---
model_config:
  "qwen2.5:1.5b":
    preferred_endpoints: ["external-provider"]
  "claude-sonnet":
    api_format: "anthropic"
    # DEMO ONLY: Mock API key. In production, use K8s Secrets or ATM.
    access_key: "mock-anthropic-key-for-demo"
    preferred_endpoints: ["anthropic-endpoint"]
  "qwen2.5-7b":
    preferred_endpoints: ["gpu-endpoint"]

# --- Categories ---
categories:
  - name: math
    description: "Mathematics and quantitative reasoning"
    mmlu_categories: ["math"]
  - name: "computer science"
    description: "Computer science and programming"
    mmlu_categories: ["computer_science"]
  - name: health
    description: "Health and medical information"
    mmlu_categories: ["health"]
  - name: business
    description: "Business and finance"
    mmlu_categories: ["business"]
  - name: other
    description: "General knowledge"
    mmlu_categories: ["other"]

# --- Complexity Rules (embedding-based, few-shot) ---
# vSR compares query embeddings against hard/easy candidates using mmbert.
# difficultySignal = maxHardSim - maxEasySim → hard/medium/easy
complexity_rules:
  - name: "query-complexity"
    description: "General query complexity classification"
    threshold: 0.2
    hard:
      candidates:
        - "Implement a binary search tree with insert, delete, and balanced rotation operations"
        - "Implement a distributed lock manager with leader election and fencing tokens"
        - "Design a database migration system with rollback support and schema versioning"
        - "Prove the fundamental theorem of calculus using epsilon-delta definition"
        - "Write a comprehensive analysis comparing merge sort, quicksort, and timsort with proofs of time complexity"
        - "Analyze the economic implications of quantitative easing on emerging market bond yields"
        - "Build a graph algorithm for strongly connected components with Tarjan's algorithm"
        - "Implement a custom memory allocator with garbage collection and fragmentation handling"
        - "Derive the Black-Scholes option pricing formula from first principles"
    easy:
      candidates:
        - "What is 2+2?"
        - "What is the capital of France?"
        - "How many days are in a week?"
        - "What does ETF stand for?"
        - "Write hello world in Python"
        - "What is 5 + 3?"
        - "Solve 2x = 10"
        - "What is Kubernetes?"
        - "What is a bond yield?"

# --- Decision-based Routing ---
# When model="auto", vSR classifies the query and routes based on these rules.
# Higher priority = evaluated first. First matching decision wins.
strategy: "priority"

decisions:
  # Easy queries always stay internal (cost optimized, regardless of domain)
  - name: "easy_internal"
    description: "Simple queries stay on-prem — no need for expensive external model"
    priority: 200
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "query-complexity:easy"
    modelRefs:
      - model: "qwen2.5-7b"
        use_reasoning: false
    plugins:
      - type: "pii"
        configuration:
          enabled: true
          threshold: 0.7
          pii_types_allowed: ["ORGANIZATION"]

  # Specialized domain + hard complexity → external model (when tier allows)
  # Medium/easy complexity stays internal even for math/CS domains
  - name: "math_external"
    description: "Route hard math queries to powerful external model"
    priority: 100
    rules:
      operator: "AND"
      conditions:
        - type: "domain"
          name: "math"
        - type: "complexity"
          name: "query-complexity:hard"
    modelRefs:
      - model: "claude-sonnet"
        use_reasoning: false
    plugins:
      - type: "pii"
        configuration:
          enabled: true
          threshold: 0.7
          pii_types_allowed: ["ORGANIZATION"]

  - name: "cs_external"
    description: "Route hard CS/coding queries to external model"
    priority: 100
    rules:
      operator: "AND"
      conditions:
        - type: "domain"
          name: "computer science"
        - type: "complexity"
          name: "query-complexity:hard"
    modelRefs:
      - model: "claude-sonnet"
        use_reasoning: false
    plugins:
      - type: "pii"
        configuration:
          enabled: true
          threshold: 0.7
          pii_types_allowed: ["ORGANIZATION"]

  # Default → GPU model (internal, high quality, data stays on-prem)
  # Matches medium complexity (easy is caught by easy_internal, hard+domain by math/cs_external)
  - name: "default_internal"
    description: "Default: route to internal GPU model"
    priority: 1
    rules:
      operator: "OR"
      conditions:
        - type: "complexity"
          name: "query-complexity:medium"
        - type: "complexity"
          name: "query-complexity:hard"
        - type: "complexity"
          name: "query-complexity:easy"
    modelRefs:
      - model: "qwen2.5-7b"
        use_reasoning: false
    plugins:
      - type: "pii"
        configuration:
          enabled: true
          threshold: 0.7
          pii_types_allowed: ["ORGANIZATION"]

default_model: "qwen2.5-7b"

# --- Tier-Based Model Access Policy ---
model_access_policy:
  free:
    allowed_models:
      - "qwen2.5-7b"
  premium:
    allowed_models:
      - "qwen2.5-7b"
      - "qwen2.5:1.5b"
      - "claude-sonnet"
  enterprise:
    allowed_models:
      - "*"

# Required for header-based routing in Envoy
clear_route_cache: true

observability:
  metrics:
    enabled: true
