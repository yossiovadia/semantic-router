# Envoy config for egress demo on OpenShift
# All routing decisions made by vSR ExtProc via x-selected-model header.
# Envoy routes to the correct backend cluster based on that header.
# ClearRouteCache: true in ExtProc response forces re-evaluation after headers are set.
static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8802
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              # Anthropic route (model starts with claude-)
              - match:
                  prefix: "/"
                  headers:
                  - name: x-selected-model
                    string_match:
                      prefix: "claude-"
                route:
                  cluster: anthropic_cluster
                  timeout: 300s
              # External provider route (model starts with qwen)
              - match:
                  prefix: "/"
                  headers:
                  - name: x-selected-model
                    string_match:
                      prefix: "qwen"
                route:
                  cluster: external_cluster
                  timeout: 300s
              # Internal model route (model starts with mock-)
              - match:
                  prefix: "/"
                  headers:
                  - name: x-selected-model
                    string_match:
                      prefix: "mock-"
                route:
                  cluster: internal_cluster
                  timeout: 300s
              # Default fallback — before ExtProc sets headers, this catches the initial request.
              # After ExtProc processes and sets x-selected-model + ClearRouteCache,
              # the request is re-routed to one of the above header-matched routes.
              - match:
                  prefix: "/"
                route:
                  cluster: internal_cluster
                  timeout: 300s
          http_filters:
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              grpc_service:
                envoy_grpc:
                  cluster_name: extproc_service
              allow_mode_override: true
              processing_mode:
                request_header_mode: "SEND"
                response_header_mode: "SEND"
                request_body_mode: "BUFFERED"
                response_body_mode: "BUFFERED"
                request_trailer_mode: "SKIP"
                response_trailer_mode: "SKIP"
              failure_mode_allow: true
              message_timeout: 300s
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              suppress_envoy_headers: true
          stream_idle_timeout: "300s"
          request_timeout: "300s"

  clusters:
  # vSR ExtProc (localhost — same pod)
  - name: extproc_service
    connect_timeout: 10s
    type: STATIC
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: extproc_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 9002

  # External provider (llm-katan-external service)
  - name: external_cluster
    type: STRICT_DNS
    connect_timeout: 10s
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: external_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: llm-katan-external
                port_value: 8000

  # Mock Anthropic service
  - name: anthropic_cluster
    type: STRICT_DNS
    connect_timeout: 10s
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: anthropic_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: mock-anthropic
                port_value: 8003

  # Internal model (llm-katan-internal service)
  - name: internal_cluster
    type: STRICT_DNS
    connect_timeout: 10s
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: internal_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: llm-katan-internal
                port_value: 8000

admin:
  address:
    socket_address:
      address: "0.0.0.0"
      port_value: 19001
