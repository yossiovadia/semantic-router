# Demo web UI — serves the interactive demo page and proxies API calls to the gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui
  labels:
    app: demo-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-ui
  template:
    metadata:
      labels:
        app: demo-ui
    spec:
      containers:
      - name: demo-ui
        image: image-registry.openshift-image-registry.svc:5000/vsr-egress-demo/demo-ui:latest
        ports:
        - containerPort: 8888
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-ui
  labels:
    app: demo-ui
spec:
  ports:
  - name: http
    port: 8888
    targetPort: 8888
  selector:
    app: demo-ui
