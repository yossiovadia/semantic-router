# Demo web UI — serves the interactive demo + admin pages and proxies API calls
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-ui
  namespace: vsr-egress-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: demo-ui-admin
rules:
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: demo-ui-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: demo-ui-admin
subjects:
- kind: ServiceAccount
  name: demo-ui
  namespace: vsr-egress-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui
  labels:
    app: demo-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-ui
  template:
    metadata:
      labels:
        app: demo-ui
    spec:
      serviceAccountName: demo-ui
      containers:
      - name: demo-ui
        image: image-registry.openshift-image-registry.svc:5000/vsr-egress-demo/demo-ui:latest
        ports:
        - containerPort: 8888
          name: http
        env:
        - name: FREE_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: demo-tokens
              key: free-token
              optional: true
        - name: PREMIUM_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: demo-tokens
              key: premium-token
              optional: true
        - name: AUTH_GATEWAY_HOST
          valueFrom:
            configMapKeyRef:
              name: demo-config
              key: auth-gateway-host
              optional: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-ui
  labels:
    app: demo-ui
spec:
  ports:
  - name: http
    port: 8888
    targetPort: 8888
  selector:
    app: demo-ui
