# Mock Anthropic endpoint for API translation demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-anthropic
  labels:
    app: mock-anthropic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-anthropic
  template:
    metadata:
      labels:
        app: mock-anthropic
    spec:
      containers:
      - name: mock-anthropic
        image: image-registry.openshift-image-registry.svc:5000/vsr-egress-demo/mock-anthropic:latest
        ports:
        - containerPort: 8003
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-anthropic
  labels:
    app: mock-anthropic
spec:
  ports:
  - name: http
    port: 8003
    targetPort: 8003
  selector:
    app: mock-anthropic
