# Request rate limiting via Kuadrant/Limitador
# Enforced at the Gateway level — returns 429 when exceeded
#
# Known Kuadrant Wasm shim v0.11.1 limitations:
#
# 1. TokenRateLimitPolicy (v1alpha1) breaks AuthPolicy when both target
#    the same Gateway. The token-based policy's response body processing
#    causes the auth action to be skipped (unauth requests return 200).
#    Workaround: use RateLimitPolicy (v1, request-based) only.
#
# 2. Per-tier rate limits (e.g. free=10, premium=50, enterprise=500)
#    are not possible. The Wasm shim evaluates rate limits BEFORE auth,
#    so auth.identity.tier is empty when the when-predicate runs.
#    Workaround: use a global limit for all tiers.
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: vsr-demo-rate-limits
  namespace: openshift-ingress
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: vsr-demo-gateway
  limits:
    per-user-limit:
      rates:
        - limit: 200
          window: 1m
