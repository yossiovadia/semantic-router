version: "2"

run:
  timeout: "5m"

linters:
  enable:
    - cyclop
    - funlen
    - gocognit
    - interfacebloat
    - nestif
  settings:
    cyclop:
      max-complexity: 12
    funlen:
      lines: 100
      statements: 40
    gocognit:
      min-complexity: 20
    interfacebloat:
      max: 5
    nestif:
      min-complexity: 4
  exclusions:
    rules:
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)handlers/openclaw_(provision|rooms|teams|test|websocket|workers)\.go$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
