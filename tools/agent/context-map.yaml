    - path: tools/agent/repo-manifest.yaml
      reason: Canonical executable inventory and doc governance metadata.
    - path: tools/agent/task-matrix.yaml
      reason: Task classification and fast-test mapping.
    - path: tools/agent/skill-registry.yaml
