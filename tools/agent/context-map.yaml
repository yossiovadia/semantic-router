      reason: Router playbook for config and runtime contract changes.
    - path: docs/agent/module-boundaries.md
      reason: Router boundary and hotspot guidance.
  signal_runtime:
    - path: docs/agent/playbooks/go-router.md
      reason: Router playbook for signal-layer changes.
  decision_logic:
    - path: docs/agent/playbooks/go-router.md
