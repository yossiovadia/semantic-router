version: 1

defaults:
  start_here:
    - path: AGENTS.md
      reason: Short harness entrypoint and canonical command index.
    - path: docs/agent/README.md
      reason: Canonical docs index and task-first navigation entry.
    - path: docs/agent/context-management.md
      reason: Progressive disclosure model and context-pack policy for this repository.
  resume_refs:
    - path: docs/agent/plans/README.md
      reason: Use when the work needs a resumable execution loop across sessions or contributors.
    - path: docs/agent/tech-debt-register.md
      reason: Record durable code or spec gaps that remain after the change.

rules:
  repo-docs:
    - path: docs/agent/testing-strategy.md
      reason: Validation ladder for docs, examples, and contributor-facing text changes.
  agent_text:
    - path: docs/agent/governance.md
      reason: Harness doc layering and source-of-truth policy for shared contract changes.
  agent_exec:
    - path: docs/agent/testing-strategy.md
      reason: Validation ladder for executable harness changes.

surfaces:
  router_config_contract:
