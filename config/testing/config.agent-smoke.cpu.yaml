version: v0.1

listeners:
  - name: "agent-smoke-http"
    address: "0.0.0.0"
    port: 8888
    timeout: "60s"

decisions:
  - name: "default-route"
    description: "Minimal default route for agent smoke validation"
    priority: 100
    rules:
      operator: "AND"
      conditions: []
    modelRefs:
      - model: "smoke-model"
        use_reasoning: false

providers:
  models:
    - name: "smoke-model"
      endpoints:
        - name: "primary"
          weight: 100
          endpoint: "host.docker.internal:8000/v1"
          protocol: "http"
  default_model: "smoke-model"
