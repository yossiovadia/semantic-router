# Benchmark config for CPU vs GPU comparison
# Uses ONNX mmBERT-32K classifiers for jailbreak, PII, domain detection
# Toggle use_cpu via sed before mounting into container

mom_registry:
  "models/mmbert32k-intent-classifier-merged-onnx": "llm-semantic-router/mmbert32k-intent-classifier-merged"

response_api:
  enabled: false

router_replay:
  store_backend: "memory"
  ttl_seconds: 86400
  async_writes: true

semantic_cache:
  enabled: false

# Prompt compression — compress long prompts before signal extraction to
# reduce inference latency. Uses TextRank + position weighting (Lost in the
# Middle) + TF-IDF. No LLM needed. Set max_tokens to the sweet spot from
# the FA benchmark (512 tokens ≈ 19 ms per classifier on MI300X).
prompt_compression:
  enabled: PROMPT_COMPRESSION_PLACEHOLDER
  max_tokens: PROMPT_COMPRESSION_MAX_TOKENS_PLACEHOLDER

# Enable semi-streaming body processing. Requires Envoy request_body_mode: STREAMED.
streamed_body_mode: true

prompt_guard:
  enabled: false

classifier:
  category_model:
    enabled: true
    use_mmbert_32k: true
    model_id: "models/mmbert32k-intent-classifier-merged-onnx"
    category_mapping_path: "models/mmbert32k-intent-classifier-merged-onnx/category_mapping.json"
    use_cpu: USE_CPU_PLACEHOLDER
    threshold: 0.5

hallucination_mitigation:
  enabled: false

feedback_detector:
  enabled: false

vllm_endpoints:
  - name: "local_vllm"
    address: "127.0.0.1"
    port: 8091
    weight: 1

model_config:
  "auto":
    reasoning_family: "qwen3"
    preferred_endpoints: ["local_vllm"]

categories:
  - name: general
    description: "General queries"
  - name: technical
    description: "Technical questions"
  - name: math
    description: "Math questions"
  - name: biology
    description: "Biology questions"
  - name: computer_science
    description: "Computer science questions"

decisions:
  - name: "default"
    description: "Route by domain"
    priority: 100
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "general"
    modelRefs:
      - model: "auto"
        use_reasoning: false
        weight: 100
